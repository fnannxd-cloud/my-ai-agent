<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الذكاء الاصطناعي الشامل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h2>الوكيل الذكي الخاص بك 🤖</h2>
        </header>
        <div class="chat-box" id="chat-box">
            <div class="message ai-message">أهلاً بك يا هندسة! أنا وكيلك الذكي، كيف يمكنني مساعدتك في بناء مشروعك اليوم؟</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب تفاصيل المشروع الذي تريده هنا...">
            <button id="send-btn">إرسال</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
